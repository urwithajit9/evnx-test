name: OS matrix test

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'     # every Monday at 03:00 UTC

jobs:
  matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install evnx (unix)
        if: runner.os != 'Windows'
        run: curl -fsSL https://dotenv.space/install.sh | bash

      - name: Install evnx (windows)
        if: runner.os == 'Windows'
        run: |
          $url = "https://github.com/urwithajit9/evnx/releases/latest/download/evnx-windows-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile evnx.exe
          Move-Item evnx.exe C:\Windows\System32\evnx.exe
        shell: pwsh

      - name: Verify install
        run: evnx --version

      - name: Scan fixtures
        run: evnx scan --path fixtures/secrets.env --format pretty --exit-zero

      - name: Validate fixtures
        run: evnx validate --file fixtures/placeholders.env --exit-zero

      - name: Validate boolean-trap
        run: evnx validate --file fixtures/boolean-trap.env --exit-zero

      - name: Convert to JSON
        run: evnx convert --to json --file fixtures/clean.env

      - name: Doctor
        run: evnx doctor --exit-zero